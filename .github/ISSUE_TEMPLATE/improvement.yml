name: 개선 / 리팩토링
description: 기존 기능의 UX·성능·코드 품질 개선 또는 기술 부채 정리를 제안합니다.
title: "refactor: "
labels: ["improvement"]
body:
  - type: textarea
    id: current
    attributes:
      label: 현재 상태
      description: 어떤 부분이 어떻게 동작하고 있고, 어떤 점이 아쉬운지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 개선 제안
      description: 어떻게 바꾸면 좋을지, 기대되는 효과는 무엇인지 적어주세요.
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: 개선 유형
      multiple: true
      options:
        - UX 개선
        - 성능 최적화
        - 코드 품질 / 리팩토링
        - 접근성 (a11y)
        - 테스트 커버리지
        - 문서화
        - 빌드 / DX
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: 관련 파일 / 모듈
      description: 영향을 받는 파일 경로 또는 모듈을 적어주세요.
      placeholder: |
        - src/features/...
        - src/entities/...

  - type: textarea
    id: risk
    attributes:
      label: 영향도 / 리스크
      description: 변경 시 영향을 받을 수 있는 영역, 마이그레이션이 필요한지 등을 적어주세요.
