name: 작업 (Task)
description: 직접 진행할 작업을 트래킹하기 위한 이슈입니다. (내부용)
title: "[작업] "
labels: ["task"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - bug — 버그 수정
        - feature — 새 기능 구현
        - refactor — 리팩토링
        - perf — 성능 개선
        - chore — 빌드 / 툴링 / 의존성
        - docs — 문서
        - test — 테스트 추가 / 보강
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      description: 무엇을 할 건지 한두 문장으로 적어주세요.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 배경 / 맥락
      description: 왜 필요한지, 어떤 문제를 해결하는지 적어주세요. 관련 FDD·이슈·PR이 있다면 링크해주세요.
      placeholder: |
        - 관련 FDD: https://www.notion.so/...
        - 관련 이슈: #
        - 관련 PR: #

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건 (Acceptance Criteria)
      description: 무엇이 충족되면 이 작업이 끝난 것으로 볼지 체크리스트로 적어주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위 / 관련 파일
      description: 어떤 모듈·파일에 영향을 주는지 적어주세요.
      placeholder: |
        - src/features/...
        - src/entities/...

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - P0 — 즉시 처리
        - P1 — 이번 마일스톤
        - P2 — 다음 마일스톤
        - P3 — 백로그
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 메모 / 참고
      description: 추가로 남기고 싶은 메모가 있다면 적어주세요.
